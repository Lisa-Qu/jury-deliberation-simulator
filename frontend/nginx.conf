server {
    listen 80;

    # Proxy API + SSE to the backend container. SSE needs buffering off and
    # HTTP/1.1 with no forced Connection close so events stream through.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
